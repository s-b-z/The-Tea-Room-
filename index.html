<!DOCTYPE html> <!-- Tell the browser this file uses modern HTML5 -->
<html lang="en"> <!-- Start the HTML document and set the page language to English -->
<head> <!-- Start the head section that stores setup information -->
  <meta charset="UTF-8"> <!-- Allow standard characters and symbols to display properly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Make the page scale correctly on phones -->
  <title>The Tea Room</title> <!-- Set the browser tab title -->

  <link rel="stylesheet" href="styles.css"> <!-- Connect this page to the shared stylesheet -->

  <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- Speed up the Google Fonts connection -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- Speed up the second Google Fonts connection -->
  <link href="https://fonts.googleapis.com/css2?family=Comforter+Brush&family=Fascinate+Inline&display=swap" rel="stylesheet"> <!-- Load the decorative fonts -->
</head> <!-- End the head section -->

<body class="home-page"> <!-- Start the page body and give it a class used for home-page styling -->
  <section class="hero top"> <!-- Start the top image section -->
    <img src="assets/tea-room1.jpg" alt="Tea Room"> <!-- Show the top restaurant image -->
  </section> <!-- End the top image section -->

  <section id="main"> <!-- Start the main center content area -->
    <h1>Welcome to</h1> <!-- Display the welcome line -->
    <h2>The Tea Room</h2> <!-- Display the decorative site title -->
    <button id="menu-btn" type="button">Menu</button> <!-- Create the button that takes the user to the menu page -->
  </section> <!-- End the main center content area -->

  <section class="hero bottom"> <!-- Start the bottom image section -->
    <img src="assets/tea-room2.jpg" alt="Tea Room 2"> <!-- Show the bottom restaurant image -->
  </section> <!-- End the bottom image section -->

  <script src="script.js"></script> <!-- Load the JavaScript for the home page -->
</body> <!-- End the page body -->
</html> <!-- End the HTML document -->
